behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 81920
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
      memory:
        sequence_length: 64
        memory_size: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        strength: 0.05
        gamma: 0.99
        network_settings:
          hidden_units: 128
        learning_rate: 3.0e-4
    max_steps: 50000000
    time_horizon: 192
    summary_freq: 50000
    checkpoint_interval: 1000000
    keep_checkpoints: 10

environment_parameters:
  ball_max_distance:
    curriculum:
      - name: Lesson0_Close
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          min_lesson_length: 100
          threshold: 1.0
        value: 1.5
      - name: Lesson1_Medium
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          min_lesson_length: 100
          threshold: 1.5
        value: 3.0
      - name: Lesson2_Far
        value: 5.0
  ball_max_offset:
    curriculum:
      - name: Lesson0_Forward
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          min_lesson_length: 100
          threshold: 1.0
        value: 0.3
      - name: Lesson1_Side
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          min_lesson_length: 100
          threshold: 1.5
        value: 1.5
      - name: Lesson2_Anywhere
        value: 3.0
  ball_mass:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.05
      max_value: 0.2
  ball_scale:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.04
      max_value: 0.15